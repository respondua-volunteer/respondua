services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-respondua}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  nginx: 
    restart: unless-stopped
    container_name: nginx
    build:
      context: .
      dockerfile: ./docker/nginx/development/Dockerfile
    ports:
      - 80:80
    volumes:
      - static_volume:/app/staticfiles
      - ./media:/app/media
      - ./docker/nginx/development:/etc/nginx/conf.d
    depends_on: 
      - volunteer
  volunteer:
    build: .
    container_name: volunteer
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_HOST=redis
    volumes:
      - static_volume:/app/staticfiles
      - ./media:/app/media
      - ./.env:/app/.env
      - ./home/locale:/app/home/locale
      - ./blog/locale:/app/blog/locale
      - ./donations/locale:/app/donations/locale
    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_started
      postgres:
        condition: service_healthy

  redis:
    # image: redis:7.2.0-alpine3.18
    container_name: redis
    build: ./redis
    ports:
      - '6379:6379'
    command: sh -c "./init.sh"
    privileged: true
    # command: ["redis-server", "--appendonly", "no", "--maxmemory", "500mb", "--maxmemory-policy", "allkeys-lru", "--daemonize", "yes"]
    hostname: redis    
    volumes:
      - redisdata:/data
      - /proc/sys:/host_proc/sys:ro
    cap_add:
      - SYS_ADMIN

volumes:
  redisdata:
  static_volume:
  postgres_data:
