apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: googleapis
  namespace: {{ .Values.gateway.namespace }}
spec:
  hosts:
  - "*.googleapis.com"
  - "googleapis.com"
  ports:
  - number: 443
    name: https
    protocol: HTTPS
  - number: 80
    name: http
    protocol: HTTP
  location: MESH_EXTERNAL
  resolution: DNS
