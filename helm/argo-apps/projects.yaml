apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infrastructure
  namespace: argo-cd
spec:
  description: Infrastructure services (Istio, Cert-Manager, Monitoring)
  
  sourceRepos:
  - https://github.com/respondua-volunteer/respondua.git
  - https://kiali.org/helm-charts
  - https://kiali.org/helm-charts/
  
  destinations:
  - namespace: argo-cd
    server: https://kubernetes.default.svc
  - namespace: istio-system
    server: https://kubernetes.default.svc
  - namespace: gateway
    server: https://kubernetes.default.svc
  - namespace: cert-manager
    server: https://kubernetes.default.svc
  - namespace: monitoring
    server: https://kubernetes.default.svc
  - namespace: kube-system
    server: https://kubernetes.default.svc
  - namespace: metallb-system
    server: https://kubernetes.default.svc
  - namespace: postgresql
    server: https://kubernetes.default.svc
  - namespace: redis
    server: https://kubernetes.default.svc
  
  clusterResourceWhitelist:
  - group: ''
    kind: 'Namespace'
  - group: 'rbac.authorization.k8s.io'
    kind: 'ClusterRole'
  - group: 'rbac.authorization.k8s.io'
    kind: 'ClusterRoleBinding'
  - group: 'cert-manager.io'
    kind: 'ClusterIssuer'
  - group: 'apiextensions.k8s.io'
    kind: 'CustomResourceDefinition'
  - group: 'admissionregistration.k8s.io'
    kind: 'ValidatingWebhookConfiguration'
  - group: 'admissionregistration.k8s.io'
    kind: 'MutatingWebhookConfiguration'
  - group: 'metallb.io'
    kind: 'IPAddressPool'
  - group: 'metallb.io'
    kind: 'L2Advertisement'
  - group: 'apiregistration.k8s.io'
    kind: 'APIService'
  
  namespaceResourceWhitelist:
  - group: ''
    kind: '*'
  - group: 'apps'
    kind: '*'
  - group: 'autoscaling'
    kind: '*'
  - group: 'policy'
    kind: '*'
  - group: 'networking.k8s.io'
    kind: '*'
  - group: 'cert-manager.io'
    kind: '*'
  - group: 'batch'
    kind: '*'
  - group: 'rbac.authorization.k8s.io'
    kind: '*'
  - group: 'metallb.io'
    kind: '*'
  - group: 'networking.istio.io'
    kind: '*'
  - group: 'security.istio.io'
    kind: '*'
  
  roles:
  - name: admin
    description: Full access to infrastructure project
    policies:
    - p, proj:infrastructure:admin, applications, *, infrastructure/*, allow
    - p, proj:infrastructure:admin, repositories, *, *, allow

---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: services
  namespace: argo-cd
spec:
  description: Microservices (respondua)
  
  sourceRepos:
  - https://github.com/dimaserbenyuk/mcp-incident-analyst.git
  - https://github.com/respondua-volunteer/respondua.git
  
  destinations:
  - namespace: authenticate
    server: https://kubernetes.default.svc
  - namespace: web
    server: https://kubernetes.default.svc
  - namespace: respondua
    server: https://kubernetes.default.svc
  - namespace: mcp-server
    server: https://kubernetes.default.svc
  
  clusterResourceWhitelist:
  - group: ''
    kind: 'Namespace'
  
  namespaceResourceWhitelist:
  - group: ''
    kind: '*'
  - group: 'apps'
    kind: '*'
  - group: 'autoscaling'
    kind: '*'
  - group: 'policy'
    kind: '*'
  - group: 'networking.k8s.io'
    kind: '*'
  - group: 'networking.istio.io'
    kind: '*'
  - group: 'security.istio.io'
    kind: '*'
  - group: 'batch'
    kind: '*'
  
  roles:
  - name: developer
    description: Full access to services project
    policies:
    - p, proj:services:developer, applications, *, services/*, allow
