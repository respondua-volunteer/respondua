{{- range .Values.certificates }}
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ .name }}
  namespace: {{ $.Values.namespace }}
spec:
  secretName: {{ .secretName }}
  issuerRef:
    name: {{ $.Values.clusterIssuer }}
    kind: ClusterIssuer
  dnsNames:
  {{- range .dnsNames }}
  - {{ . | quote }}
  {{- end }}
{{- end }}
